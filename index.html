<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="IntelliTrax" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#07090f" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/MedIntel/favicon.png" />
    <link rel="apple-touch-icon" href="/MedIntel/favicon.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/MedIntel/manifest.json" />

    <title>IntelliTrax</title>

    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/MedIntel/sw.js', { scope: '/MedIntel/' })
            .catch(function (err) { console.warn('SW registration failed:', err); });
        });
      }
    </script>
  </head>
  <body style="background:#07090f; margin:0;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
